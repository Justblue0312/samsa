[project]
name = "samsakit"
version = "0.1.0"
description = "Samsa Python toolkit including story recommender"
readme = "README.md"
authors = [
    { name = "Justblue0312", email = "trao0312@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "sqlalchemy[asyncio]>=2.0.0",
    "alembic>=1.14.0",
    "asyncpg>=0.30.0",
    "pydantic-ai[openai]>=0.0.0",
    "pydantic>=2.0",
    "tiktoken>=0.7.0",
    "redis>=5.0.0",
    "python-dotenv>=1.0.0",
    "connect-python>=0.4.0",
    "protobuf>=7.0",
    "pydantic-settings>=2.13.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.24.0",
    "ruff>=0.8.0",
    "pyright>=1.1.0",
]

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["I", "UP", "T20"]
ignore = [
    "F841",
    "UP040",
    "T201",
    "UP046",
]

[tool.pyright]
exclude = [
    "**/proto/**",
    "**/__pycache__/**",
    ".venv/**",
]
reportMissingImports = "warning"

[tool.pytest.ini_options]
asyncio_mode = "auto"
