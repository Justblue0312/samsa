[project]
name = "crawlbot"
version = "0.1.0"
description = "Add your description here"
readme = "README.md"
authors = [
    { name = "Justblue0312", email = "trao0312@gmail.com" }
]
requires-python = ">=3.13"
dependencies = [
    "beautifulsoup4>=4.14.3",
    "requests>=2.32.5",
    "aiohttp>=3.11.12",
    "aiofiles>=24.1.0",
    "curl-cffi>=0.14.0",
]

[project.scripts]
crawlbot = "crawlbot.main:main"

[build-system]
requires = ["uv_build>=0.10.0,<0.11.0"]
build-backend = "uv_build"

[tool.ruff]
line-length = 120

[tool.ruff.lint]
extend-select = ["I", "UP", "T20"]
ignore = [
    "F841",  # remove unused variables
    "UP040", # new type alias syntax not supported by mypy yet
    "T201",  # print found
    "UP046", # non-pep695-generic-class
]
