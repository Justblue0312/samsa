        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.APIError'
      security:
      - BearerAuth: []
      summary: Get flag by ID
      tags:
      - flags
    patch:
      consumes:
      - application/json
      description: Updates flag details. Requires moderator/inspector role.
      parameters:
      - description: Flag UUID
        in: path
        name: flag_id
        required: true
        type: string
      - description: Flag update request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/flag.UpdateFlagRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/flag.FlagResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.APIError'
      security:
      - BearerAuth: []
      summary: Update flag
      tags:
      - flags
  /authors:
    get:
      consumes:
      - application/json
      description: |-
        Retrieves a list of authors with pagination and optional filters.
        Supports anonymous and authenticated users. Required scopes: `author:read`.
      parameters:
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 20, max: 100)'
        in: query
        name: limit
        type: integer
      - description: Sort field (created_at, updated_at, stage_name)
        example: created_at:desc
        in: query
        name: order_by
        type: string
      - description: Filter by recommended status
        example: true
        in: query
        name: is_recommended
        type: boolean
      - description: Search by stage name
        example: foo
        in: query
        name: search_query
        type: string
