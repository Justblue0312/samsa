paths:
  /{user_id}/online:
    get:
      consumes:
      - application/json
      description: Checks if a user is currently online. Requires user actor.
      parameters:
      - description: User UUID
        in: path
        name: user_id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties:
              type: boolean
            type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/apierror.APIError'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/apierror.APIError'
      security:
      - BearerAuth: []
      summary: Check user online status
      tags:
      - users
  /admin/flags:
    get:
      consumes:
      - application/json
      description: Retrieves flags with filtering options. Requires moderator/inspector
        role.
      parameters:
      - description: Filter by story UUID
        in: query
        name: story_id
        type: string
      - description: Filter by chapter UUID
        in: query
        name: chapter_id
        type: string
      - description: Filter by inspector UUID
        in: query
        name: inspector_id
        type: string
      - description: Filter by flag type
        in: query
        name: flag_type
        type: string
      - description: Filter by flag rate
        in: query
        name: flag_rate
        type: string
      - description: Minimum flag score
        format: float64
        in: query
        name: min_score
        type: number
      - description: Maximum flag score
        format: float64
        in: query
        name: max_score
        type: number
      - description: Limit
        in: query
        name: limit
        type: integer
      - description: Offset
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/flag.FlagListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.APIError'
      security:
      - BearerAuth: []
      summary: List flags
      tags:
      - flags
    post:
      consumes:
      - application/json
      description: Creates a new flag for content moderation. Requires moderator/inspector
        role.
      parameters:
      - description: Flag creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/flag.CreateFlagRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/flag.FlagResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.APIError'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/apierror.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.APIError'
        "422":
          description: Unprocessable Entity
          schema:
            $ref: '#/definitions/apierror.APIError'
      security:
      - BearerAuth: []
      summary: Create flag
      tags:
      - flags
  /admin/flags/{flag_id}:
    delete:
      description: Deletes a flag. Requires moderator/inspector role.
      parameters:
      - description: Flag UUID
        in: path
        name: flag_id
        required: true
        type: string
      responses:
        "204":
          description: No Content
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/apierror.APIError'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/apierror.APIError'
      security:
      - BearerAuth: []
      summary: Delete flag
      tags:
      - flags
    get:
      consumes:
      - application/json
      description: Retrieves a flag by its UUID. Requires moderator/inspector role.
      parameters:
      - description: Flag UUID
        in: path
        name: flag_id
